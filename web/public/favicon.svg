<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="sky" cx="50%" cy="32%" r="85%">
      <stop offset="0%" stop-color="#16203a"/>
      <stop offset="100%" stop-color="#070a16"/>
    </radialGradient>
    <radialGradient id="moon" cx="38%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#dedcd4"/>
      <stop offset="55%" stop-color="#bdbbb1"/>
      <stop offset="100%" stop-color="#8c8a7f"/>
    </radialGradient>
  </defs>

  <!-- deep-space tile -->
  <rect width="64" height="64" rx="14" fill="url(#sky)"/>

  <!-- stars -->
  <circle cx="13" cy="15" r="1" fill="#ffffff" opacity="0.85"/>
  <circle cx="51" cy="12" r="1.3" fill="#ffffff" opacity="0.7"/>
  <circle cx="47" cy="25" r="0.9" fill="#ffd9a0" opacity="0.85"/>
  <circle cx="9" cy="30" r="0.8" fill="#ffffff" opacity="0.6"/>

  <!-- moon planet rising from the bottom -->
  <circle cx="32" cy="66" r="35" fill="url(#moon)"/>
  <!-- craters -->
  <circle cx="20" cy="46" r="3.2" fill="#9b998e" opacity="0.5"/>
  <circle cx="44" cy="52" r="4.2" fill="#9b998e" opacity="0.42"/>
  <circle cx="34" cy="43" r="2" fill="#9b998e" opacity="0.5"/>

  <!-- spires (projects) with glowing caps -->
  <!-- left — amber -->
  <rect x="20.4" y="22" width="3" height="13" rx="1.3" fill="#33384a"/>
  <circle cx="21.9" cy="21" r="3" fill="#ffd9a0"/>
  <circle cx="21.9" cy="21" r="5" fill="#ffd9a0" opacity="0.22"/>
  <!-- centre — emerald, tallest -->
  <rect x="30.3" y="13" width="3.4" height="22" rx="1.5" fill="#33384a"/>
  <circle cx="32" cy="12" r="3.5" fill="#34d399"/>
  <circle cx="32" cy="12" r="6" fill="#34d399" opacity="0.2"/>
  <!-- right — teal -->
  <rect x="41.4" y="25" width="3" height="12" rx="1.3" fill="#33384a"/>
  <circle cx="42.9" cy="24" r="2.8" fill="#5fb8c4"/>
  <circle cx="42.9" cy="24" r="4.6" fill="#5fb8c4" opacity="0.22"/>
</svg>
